<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Guilde - Vendredi</title>

    <link rel="stylesheet" href="../../../assets/css/header.css">
    <link rel="stylesheet" href="../../../assets/css/index.css">
    <link rel="stylesheet" href="../../../assets/css/mh-guild-card.css">

    <link rel="stylesheet" href="../../../assets/css/youtube-audio.css" />
    <script src="../../../assets/js/youtube-audio.js" defer></script>

</head>

<body
  data-nav-theme="ocs"
  data-global-header-style="mh-guild-card"
>
    <div id="site-header"></div>

    <main class="page-content">
        <section class="main-content">

            <div class="guild-card">
                <img 
                class="bg"
                src="../../../assets/images/oc-gallery/vendredi/background.jpg"
                alt="background"
                />
                <div class="photo">
                    <img src="../../../assets/images/oc-gallery/vendredi/0000001474.png" alt="Illustration du personnage">
                    <p>Préférerais-tu être défini par la perte, ou par le souvenir de ce qui fut autrefois ?</p>
                </div>
            </div>
        </section>

        <section class="music-player">
            <div class="yt-audio-trigger card"
                data-youtube="https://www.youtube.com/watch?v=TwG-agL7viE"
                tabindex="0"
                role="button"
            >
                <img src="../../../assets/images/oc-gallery/vendredi/cover.jpg" alt="Cover" />
                <p><a href="https://www.youtube.com/watch?v=TwG-agL7viE" target="_blank" rel="noopener">Could Have Been Me<br><em>The Struts</em></a></p>
            </div>
        </section>
    </main>

    <script src="../../../assets/js/header.js"></script>
</body>
</html>
