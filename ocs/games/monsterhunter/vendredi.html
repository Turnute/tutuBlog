<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Guilde - Vendredi</title>

    <link rel="stylesheet" href="../../../assets/css/header.css">
    <link rel="stylesheet" href="../../../assets/css/index.css">

    <style>
        .guild-card {
        position: relative;
        width: 420px;
        height: 260px;
        padding: 20px;
        background: linear-gradient(135deg, #d8c29a, #b8915f);
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        overflow: hidden;
        }

        /* La "photo" posée sur la carte */
        .photo {
        position: absolute;
        top: 25px;
        right: 30px;

        width: 140px;
        padding: 10px 10px 24px 10px; /* bas plus grand = effet photo imprimée */
        background: #f8f6f1;
        border: 1px solid rgba(0,0,0,0.08);

        transform: rotate(-6deg);
        box-shadow:
            0 10px 18px rgba(0,0,0,0.25),
            0 2px 4px rgba(0,0,0,0.12);

        z-index: 2;


        }

        /* L'image du personnage */
        .photo img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
        }

        .photo::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%) rotate(3deg);

        width: 60px;
        height: 20px;
        background: rgba(255,255,220,0.55);
        border: 1px solid rgba(180,180,140,0.25);
        box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <main class="page-content">

    </main>
        <div class="guild-card">
            <div class="photo">
                <img src="../../../assets/images/oc-gallery/morgane/IMG_1010.JPG" alt="Illustration du personnage">
            </div>
        </div>
    <script src="../../../assets/js/header.js"></script>
</body>
</html>
